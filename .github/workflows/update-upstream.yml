name: Update upstream

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  PAPER_BRANCH: dev/26.2

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
      - name: Resolve latest Paper commit
        id: paper
        run: |
          latest="$(git ls-remote https://github.com/PaperMC/Paper.git "refs/heads/$PAPER_BRANCH" | cut -f1)"
          current="$(grep '^paperRef=' gradle.properties | cut -d= -f2)"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
      - name: Bump and rebuild patches
        if: steps.paper.outputs.latest != steps.paper.outputs.current
        run: |
          sed -i "s/^paperRef=.*/paperRef=${{ steps.paper.outputs.latest }}/" gradle.properties
          ./gradlew applyAllPatches --stacktrace
          ./gradlew rebuildPaperPatches waffle-server:rebuildAllServerPatches --stacktrace
      - name: Open pull request
        if: steps.paper.outputs.latest != steps.paper.outputs.current
        uses: peter-evans/create-pull-request@v6
        with:
          branch: update/upstream-paper
          title: Update upstream Paper
          commit-message: Update upstream Paper to ${{ steps.paper.outputs.latest }}
          body: |
            Bumps `paperRef` to [PaperMC/Paper@${{ steps.paper.outputs.latest }}](https://github.com/PaperMC/Paper/commit/${{ steps.paper.outputs.latest }}) (`${{ env.PAPER_BRANCH }}`).

            Patches were rebuilt automatically. Review the diff before merging — a rebased upstream can require manual conflict resolution.
